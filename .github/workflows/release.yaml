name: Release

on:
    push:
        tags:
            - "v*"

concurrency:
    group: release-${{ github.ref_name }}
    cancel-in-progress: false

permissions:
    contents: write

env:
    RELEASE_VERSION: ${{ github.ref_name }}

jobs:
    release:
        name: release (${{ matrix.os }}, ${{ matrix.target }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: macos-latest
                      target: aarch64-apple-darwin

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Verify tag is on main
              run: |
                  git fetch origin main
                  if ! git merge-base --is-ancestor ${{ github.sha }} origin/main; then
                    echo "Error: tag must point to a commit on main branch."
                    exit 1
                  fi

            - uses: pnpm/action-setup@v6
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile

            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: desktop/src-tauri

            - name: Import code signing certificate
              run: |
                  echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
                  security create-keychain -p "" build.keychain
                  security default-keychain -s build.keychain
                  security unlock-keychain -p "" build.keychain
                  security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
                  security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
                  security add-trusted-cert -d -r trustRoot -k build.keychain certificate.p12 2>/dev/null || true
                  rm certificate.p12
              env:
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

            - uses: tauri-apps/tauri-action@v0.6.2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: "KeliKeli Code Signing"
              with:
                  projectPath: desktop
                  tagName: ${{ env.RELEASE_VERSION }}
                  releaseName: KeliKeli ${{ env.RELEASE_VERSION }}
                  releaseDraft: false
                  includeUpdaterJson: true
                  args: --target ${{ matrix.target }}
