name: Release

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Release version (e.g. v1.0.0)"
                required: true
                type: string

concurrency:
    group: release-${{ github.event.inputs.version }}
    cancel-in-progress: false

permissions:
    contents: write

jobs:
    create_tag:
        name: Create tag
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Create tag if missing
              run: |
                  TAG="${{ github.event.inputs.version }}"
                  if git rev-parse "$TAG" >/dev/null 2>&1; then
                    echo "Tag $TAG already exists, skip creating."
                  else
                    git tag "$TAG"
                    git push origin "$TAG"
                  fi

    release:
        name: release (${{ matrix.os }}, ${{ matrix.target }})
        needs: create_tag
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: macos-latest
                      target: aarch64-apple-darwin

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
              with:
                  version: 10.33.0
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml
            - run: pnpm install --frozen-lockfile

            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: desktop/src-tauri

            - uses: tauri-apps/tauri-action@v0.6.2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  projectPath: desktop
                  tagName: ${{ github.event.inputs.version }}
                  releaseName: KeliKeli ${{ github.event.inputs.version }}
                  releaseDraft: false
                  includeUpdaterJson: true
                  args: --target ${{ matrix.target }}
