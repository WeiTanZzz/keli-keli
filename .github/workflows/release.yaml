name: Release

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Release version (e.g. v1.0.0)"
                required: true
                type: string

concurrency:
    group: release-${{ github.event.inputs.version }}
    cancel-in-progress: false

permissions:
    contents: write

env:
    RELEASE_VERSION: ${{ github.event.inputs.version }}

jobs:
    create_tag:
        name: Create tag
        runs-on: ubuntu-latest
        if: github.ref_name == 'main'

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  token: ${{ secrets.RELEASE_PAT }}

            - name: Verify version is not a downgrade
              env:
                  GH_TOKEN: ${{ secrets.RELEASE_PAT }}
              run: |
                  NEW="${{ env.RELEASE_VERSION }}"
                  LATEST=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "v0.0.0")
                  if [ "$LATEST" = "null" ]; then LATEST="v0.0.0"; fi
                  HIGHEST=$(printf '%s\n' "$LATEST" "$NEW" | sort -V | tail -1)
                  if [ "$HIGHEST" != "$NEW" ]; then
                    echo "Error: $NEW is not newer than the latest release $LATEST."
                    exit 1
                  fi

            - name: Bump version in files
              run: |
                  VERSION="${RELEASE_VERSION#v}"
                  sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" desktop/package.json
                  sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" desktop/src-tauri/tauri.conf.json
                  sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" desktop/src-tauri/Cargo.toml
                  sed -i '/^name = "keli-keli"$/{n; s/^version = "[^"]*"/version = "'"$VERSION"'"/}' desktop/src-tauri/Cargo.lock

            - name: Commit version bump
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add desktop/package.json desktop/src-tauri/tauri.conf.json desktop/src-tauri/Cargo.toml desktop/src-tauri/Cargo.lock
                  if git diff --cached --quiet; then
                    echo "No version changes to commit."
                  else
                    git commit -m "chore: bump version to ${RELEASE_VERSION}"
                    git push origin HEAD:main
                  fi

            - name: Create tag if missing
              run: |
                  TAG="${RELEASE_VERSION}"
                  if git rev-parse "$TAG" >/dev/null 2>&1; then
                    echo "Tag $TAG already exists, skip creating."
                  else
                    git tag "$TAG"
                    git push origin "$TAG"
                  fi

    release:
        name: release (${{ matrix.os }}, ${{ matrix.target }})
        needs: [create_tag]
        if: needs.create_tag.result == 'success'
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: macos-latest
                      target: universal-apple-darwin

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ env.RELEASE_VERSION }}

            - uses: pnpm/action-setup@v6
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile

            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-apple-darwin,x86_64-apple-darwin

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: desktop/src-tauri

            - name: Import code signing certificate
              run: |
                  echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
                  security create-keychain -p "" build.keychain
                  security default-keychain -s build.keychain
                  security unlock-keychain -p "" build.keychain
                  security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
                  security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
                  security add-trusted-cert -d -r trustRoot -k build.keychain certificate.p12 2>/dev/null || true
                  rm certificate.p12
              env:
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

            - uses: tauri-apps/tauri-action@v0.6.2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: "KeliKeli Code Signing"
              with:
                  projectPath: desktop
                  tagName: ${{ env.RELEASE_VERSION }}
                  releaseName: KeliKeli ${{ env.RELEASE_VERSION }}
                  releaseDraft: false
                  includeUpdaterJson: true
                  args: --target ${{ matrix.target }}
